<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">

  <title>Einfaches 2D-CAD</title>
  <link rel="stylesheet" href="/css/style copy.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/style2.css">
</head>
<body>
    <div class = background style="background-image: url(https://gymn-benedictinum.de//templates/gymbentemplate/img/background.jpg)">
        <div class="container">
            <div class="header-desktop hidden-xs">
                
                            <div class="logo logo-desktop">
                    <a href="/"><img src="https://gymn-benedictinum.de//templates/gymbentemplate/img/logo.png"/></a>
                    <div class="bar">
                        <div class="bar-text-parent">
                            <div class="bar-text-child">
                                Gymnasium der Benediktiner<br/>Meschede
                                <div class="bar-square-parent">
                                    <div class="yellow colored-square"></div>
                                    <div class="red colored-square"></div>
                                    <div class="theme-blue colored-square"></div>
                                    <div class="cyan colored-square"></div>
                                    <div class="light-green colored-square"></div>
                                </div>
                            </div>
                            
                        </div>
                        
                    </div>
                </div>
            </div>
            
    </div>
  <header>
    <h1>2D CAD-Zeichenwerkzeug</h1>
    <div class="controls">
      <button onclick="setMode('line')">Linie</button>
      <button onclick="setMode('rect')">Rechteck</button>
      <button onclick="setMode('move')">Bewegen</button>
      <button onclick="clearCanvas()">Leeren</button>
    </div>
  </header>
  
  <main>
    <canvas id="cadCanvas" width="800" height="600"></canvas>
  </main>

  <footer>
    <p>&copy; 2024 Einfaches CAD-Zeichenwerkzeug</p>
  </footer>

  <script src="/js/script.js"></script>
</body>
</html>
